<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Web Music Player</title>
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#1db954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/175/175200.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Left Sidebar -->
      <nav class="sidebar">
        <div class="brand">
          <svg viewBox="0 0 24 24" class="logo-icon"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          <h2>Web Player</h2>
        </div>

        <ul class="nav-links">
            <li class="active" id="nav-home">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Home
            </li>
            <li id="nav-search-btn">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                Search
            </li>
        </ul>

        <div class="library-section">
          <div class="library-header" style="justify-content: space-between;">
              <div style="display:flex; align-items:center; gap:12px;">
                  <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
                  <span>Your Library</span>
              </div>
              <button class="btn-icon" id="sidebar-create-playlist" title="Create Playlist" style="width:28px; height:28px;">
                  <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              </button>
          </div>
          <div style="flex: 1; overflow-y: auto;" class="custom-scrollbar">
              <ul id="sidebar-playlists" style="list-style:none; padding: 8px 12px; margin:0; display:none;">
                  <!-- Playlists inserted here -->
              </ul>
              <ul id="artist-list" style="list-style: none; padding: 8px 12px; margin: 0; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);">
                <li class="loading-text">Scanning library...</li>
              </ul>
          </div>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main class="main-content custom-scrollbar">
        <header class="top-header">
          <div class="search-container" id="search-container" style="display: none;">
            <svg viewBox="0 0 24 24" class="search-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="search-input" placeholder="What do you want to play?" />
          </div>
          <div class="header-right">
            <button class="btn-icon" id="btn-queue-toggle" title="Queue">
              <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
              <div class="queue-badge" id="queue-badge" style="display: none;">0</div>
            </button>
          </div>
        </header>

        <div class="view-header">
            <h1 id="view-title">Good Evening</h1>
        </div>

        <div class="content-container">
          <ul id="song-list" class="song-grid">
            <li class="empty-state">
              Select an artist or search to view songs.
            </li>
          </ul>
        </div>
      </main>
    </div>

    <!-- Queue Panel (slide-out) -->
    <div class="queue-panel" id="queue-panel">
      <div class="queue-panel-header">
        <h3>Queue</h3>
        <button class="btn-icon" id="btn-queue-close" title="Close Queue">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="queue-panel-now-playing" id="queue-now-playing"></div>
      <div class="queue-panel-label" style="display:flex; justify-content:space-between; align-items:center;">
        <span>Next Up</span>
        <button class="btn-icon" id="btn-queue-shuffle" title="Shuffle Queue" style="width:24px; height:24px;">
           <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
      </div>
      <div class="queue-panel-list custom-scrollbar" id="queue-list"></div>
      <div class="queue-panel-actions">
        <button class="queue-clear-btn" id="btn-queue-clear">Clear Queue</button>
      </div>
    </div>
    <div class="queue-overlay" id="queue-overlay"></div>

    <!-- Mobile Navigation Bar -->
    <nav class="mobile-nav">
        <div class="mobile-nav-item active" id="m-nav-home">
            <svg viewBox="0 0 24 24" class="nav-icon"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </div>
        <div class="mobile-nav-item" id="m-nav-search">
            <svg viewBox="0 0 24 24" class="nav-icon"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>Search</span>
        </div>
        <div class="mobile-nav-item" id="m-nav-library">
            <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            <span>Library</span>
        </div>
    </nav>

    <!-- Mobile Full-Screen Player -->
    <div class="mobile-player-full" id="mobile-player-full">
      <div class="mpf-header">
        <button class="btn-icon mpf-close" id="mpf-close">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
        </button>
        <span class="mpf-label">Now Playing</span>
        <button class="btn-icon" id="mpf-queue-btn" title="Queue">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
        </button>
      </div>
      <div class="mpf-art" id="mpf-art">
        <svg viewBox="0 0 24 24"><path fill="#b3b3b3" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <div class="mpf-info">
        <div class="mpf-title" id="mpf-title">No song selected</div>
        <div class="mpf-artist" id="mpf-artist">-</div>
      </div>
      <div class="mpf-progress">
        <div class="progress-bar-wrapper" id="mpf-progress-wrapper">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="mpf-progress-fill"></div>
            <div class="progress-bar-thumb" id="mpf-progress-thumb" style="opacity:1;"></div>
          </div>
        </div>
        <div class="mpf-times">
          <span id="mpf-time-current">0:00</span>
          <span id="mpf-time-total">0:00</span>
        </div>
      </div>
      <div class="mpf-controls">
        <button class="btn-icon" id="mpf-prev">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="btn-icon btn-play mpf-play-btn" id="mpf-play">
          <svg viewBox="0 0 24 24" id="mpf-play-icon"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
          <svg viewBox="0 0 24 24" id="mpf-pause-icon" style="display:none;"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="btn-icon" id="mpf-next">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="mpf-extra">
        <button class="btn-icon mpf-add-playlist" id="mpf-add-to-playlist" title="Add to Playlist">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Create Playlist Modal -->
    <div class="modal" id="create-playlist-modal">
      <div class="modal-content">
        <span class="close" id="close-playlist-modal">&times;</span>
        <h2 style="margin-top:0;">Create New Playlist</h2>
        <div class="input-group">
          <label for="playlist-name-input">Playlist Name</label>
          <input type="text" id="playlist-name-input" placeholder="My Awesome Playlist" />
        </div>
        <button id="create-playlist-confirm" class="create-playlist-confirm-btn">Create Playlist</button>
      </div>
    </div>

    <!-- Add to Playlist Modal -->
    <div class="modal" id="add-to-playlist-modal">
      <div class="modal-content">
        <span class="close" id="close-add-playlist-modal">&times;</span>
        <h2 style="margin-top:0;">Add to Playlist</h2>
        <div id="add-to-playlist-list" class="add-to-playlist-list custom-scrollbar"></div>
        <button id="add-to-playlist-new" class="create-playlist-confirm-btn" style="margin-top:12px; background:transparent; border:1px dashed var(--text-secondary); color:var(--text-secondary);">
          + Create New Playlist
        </button>
      </div>
    </div>

    <!-- Bottom Player Bar -->
    <footer class="player-bar" id="player-bar">
      <div class="now-playing" id="player-bar-now-playing">
        <div class="album-art" id="np-art">
           <svg viewBox="0 0 24 24"><path fill="#b3b3b3" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="np-info">
            <div id="np-title" class="np-title">No song selected</div>
            <div id="np-artist" class="np-artist">-</div>
        </div>
      </div>
      
      <div class="player-controls">
        <div class="player-buttons">
            <button class="btn-icon" id="btn-prev" title="Previous">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="btn-icon btn-play" id="btn-play" title="Play">
                <svg viewBox="0 0 24 24" id="play-icon"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                <svg viewBox="0 0 24 24" id="pause-icon" style="display:none;"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn-icon" id="btn-next" title="Next">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
        <div class="progress-container">
            <span id="time-current" class="time-text">0:00</span>
            <div class="progress-bar-wrapper" id="progress-wrapper">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                    <div class="progress-bar-thumb" id="progress-thumb"></div>
                </div>
            </div>
            <span id="time-total" class="time-text">0:00</span>
        </div>
      </div>

      <div class="extra-controls">
         <button class="btn-icon" id="btn-add-to-playlist-bar" title="Add to Playlist">
             <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z"/></svg>
         </button>
         <button class="btn-icon" id="btn-mute" title="Mute">
             <svg viewBox="0 0 24 24" id="vol-icon"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
         </button>
         <div class="volume-bar-wrapper" id="volume-wrapper">
             <div class="volume-bar-bg">
                 <div class="volume-bar-fill" id="volume-fill"></div>
             </div>
         </div>
      </div>
      
      <!-- Hidden audio element -->
      <audio id="audio-player" preload="auto"></audio>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
